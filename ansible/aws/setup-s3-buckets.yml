---
- name: Setup S3 buckets for Cockpit CI
  hosts: localhost
  gather_facts: false
  vars_files: aws_defaults.yml

  # Use arr-cockpit-bootstrap credentials for bucket creation/configuration
  # Override with: ansible-playbook -e aws_profile=default
  vars:
    aws_profile: bootstrap

  tasks:
    - name: Create and configure images bucket {{ item.name }}
      amazon.aws.s3_bucket:
        name: "{{ item.name }}"
        state: present
        region: "{{ item.region }}"
        profile: "{{ aws_profile }}"
        # Use bucket policy for public read access (except RHEL images)
        object_ownership: BucketOwnerEnforced
        public_access:
          block_public_acls: true
          ignore_public_acls: true
          block_public_policy: false
          restrict_public_buckets: false
        policy:
          Version: '2012-10-17'
          Statement:
            - Sid: PublicReadNonRhel
              Effect: Allow
              Principal: '*'
              Action: 's3:GetObject'
              NotResource: 'arn:aws:s3:::{{ item.name }}/rhel*'
        tags:
          app-code: ARR-001
          cost-center: 700
          service-owner: cockpit
          service-phase: prod
      loop: "{{ aws_s3_images_buckets }}"

    #https://us-east-1.console.aws.amazon.com/s3/buckets/cockpit-ci-logs?region=us-east-1
    - name: Create and configure logs bucket
      amazon.aws.s3_bucket:
        name: "{{ aws_s3_logs_bucket }}"
        state: present
        region: "{{ aws_region }}"
        profile: "{{ aws_profile }}"
        # Use bucket policy for public-read GET, authenticated PUT/DELETE
        object_ownership: BucketOwnerEnforced
        public_access:
          # Allow bucket policy for public read access
          block_public_acls: true
          ignore_public_acls: true
          block_public_policy: false
          restrict_public_buckets: false
        policy:
          # Policy language version (magic constant)
          # https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_version.html
          Version: '2012-10-17'
          Statement:
            # Allow public read access to all objects
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: 's3:GetObject'
              Resource: 'arn:aws:s3:::{{ aws_s3_logs_bucket }}/*'
        tags:
          app-code: ARR-001
          cost-center: 700
          service-owner: cockpit
          service-phase: prod

    - name: Set lifecycle policy on logs bucket (90-day expiration)
      community.aws.s3_lifecycle:
        name: "{{ aws_s3_logs_bucket }}"
        state: present
        region: "{{ aws_region }}"
        profile: "{{ aws_profile }}"
        rule_id: expire-after-90-days
        status: enabled
        expiration_days: 90

    - name: Display bucket URLs
      debug:
        msg:
          - "Images buckets:"
          - "{% for b in aws_s3_images_buckets %}  https://{{ b.name }}.s3.{{ b.region }}.amazonaws.com/\n{% endfor %}"
          - "Logs bucket: https://{{ aws_s3_logs_bucket }}.s3.{{ aws_region }}.amazonaws.com/"
